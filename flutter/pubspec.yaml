name: yot_developer
description: YOT Developer - Browser DevTools Platform mobile app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP networking
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # UI icons
  flutter_svg: ^2.0.10+1

  # Code highlighting
  flutter_highlight: ^0.7.0

  # Animations
  lottie: ^3.1.0

  # URL launcher (open links in browser)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/GeistVF.ttf
          weight: 100
          style: normal
